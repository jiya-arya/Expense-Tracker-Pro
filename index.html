<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <header class="header">

        <a href="#" class="logo">
            ExpenseTracker
        </a>

        <nav class="navigation">

            <button class="btn btn--secondary">
                Login
            </button>

        </nav>

    </header>

    <main>

        <section class="hero">

            <div class="hero__content">

                <span class="hero__badge">
                    Made for Students
                </span>

                <h1 class="hero__title">
                    Track Every Rupee.
                    Build Better Money Habits.
                </h1>

                <p class="hero__description">

                    Manage your income, expenses, and savings in one place.
                    Stay organized, understand your spending, and take control
                    of your student budget.

                </p>

                <div class="hero__actions">

                    <button class="btn btn--primary">
                        Get Started
                    </button>

                    <button class="btn btn--outline">
                        Login
                    </button>

                </div>

            </div>

            <div class="hero__image">

                <img src="./assets/images/hero-placeholder.svg" alt="Expense Tracker Illustration">

            </div>

        </section>

    </main>

</body>

</html>
